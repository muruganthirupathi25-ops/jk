<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Section</title>

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: radial-gradient(circle at top, #3a0000, #000000);
            color: #fff;
        }
         nav {
        display: flex;
        justify-content: space-between;
        padding: 15px 10%;
        align-items: center;
        background: transparent;
        font-size: 18px;
    }

    .logo {
        font-size: 24px;
        font-weight: 700;
    }
    .logo span {
        color: #ff4d4d;
    }

    .nav-links {
        display: flex;
        gap: 40px;
    }

    .nav-links a {
        color: #fff;
        text-decoration: none;
        position: relative;
        font-weight: 500;
    }

    .nav-links a::after {
        content: "";
        width: 0;
        height: 3px;
        background: #ff4d4d;
        position: absolute;
        left: 0;
        bottom: -5px;
        transition: 0.3s;
    }

    .nav-links a:hover::after,
    .nav-links .active::after {
        width: 100%;
    }

        .contact-section {
            padding: 70px 10%;
        }

        /* Heading */
        .title {
            text-align: center;
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 40px;
            position: relative;
        }

        .title::after {
            content: "";
            width: 120px;
            height: 4px;
            background: #ff4d4d;
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 10px;
        }

        /* Grid Layout */
        .content-wrapper {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            align-items: flex-start;
        }

        /* Left Side Text */
        .left-box {
            width: 45%;
            font-size: 17px;
            line-height: 1.7;
        }

        .contact-item {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
        }

        .icon {
            color: #ff4d4d;
            font-size: 20px;
        }

        .socials {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            font-size: 30px;
        }

        .socials i {
            cursor: pointer;
            transition: 0.3s;
        }

        .socials i:hover {
            color: #ff4d4d;
            transform: scale(1.2);
        }

        /* Right Form */
        .contact-form {
            width: 45%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 12px;
        }

        .input-box {
            width: 100%;
            margin-bottom: 20px;
        }

        .input-box input,
        .input-box textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid #aa2b2b;
            color: #fff;
            border-radius: 8px;
            resize: none;
            outline: none;
            font-size: 16px;
        }

        .btn-send {
            width: 100%;
            padding: 15px;
            text-align: center;
            background: transparent;
            border: 2px solid #ff4d4d;
            color: #ff4d4d;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send:hover {
            background: #ff4d4d;
            color: #000;
        }
    </style>
</head>
<body>
    <nav>
    <div class="logo"><span>protfolie-person</span></div>

    <div class="nav-links">
        <a href="./home.html" class="active">Home</a>
        <a href="./about.html">About</a>
        <a href="#">Projects</a>
        <a href="./contact.html">Contact</a>
    </div>
</nav>

    <section class="contact-section">

        <h2 class="title">Get In Touch</h2>

        <div class="content-wrapper">

            <!-- LEFT SIDE -->
            <div class="left-box">
                <p>
                    Let's collaborate! I am always open to discussing exciting projects and new
                    opportunities.
                </p>

                <div class="contact-item">
                    <span class="icon">📧</span> muruganthirupathi@25gamil.com
                </div>

                <div class="contact-item">
                    <span class="icon">📞</span> +91 9361270071
                </div>

                <div class="contact-item">
                    <span class="icon">📍</span> INDIA
                </div>

                <!-- Social Icons -->
                <div class="socials">
                    <i>📷</i>
                    <i>💼</i>
                    <i>🟢</i>
                </div>
            </div>

            <!-- RIGHT SIDE FORM -->
            <div class="contact-form">

                <div class="input-box">
                    <input type="text" placeholder="Your Name">
                </div>

                <div class="input-box">
                    <input type="email" placeholder="Your Email">
                </div>

                <div class="input-box">
                    <textarea rows="5" placeholder="Your Message"></textarea>
                </div>

                <button class="btn-send">SEND MESSAGE</button>

            </div>

        </div>

    </section>

    <script>
        // Simple form animation
        document.querySelector(".btn-send").addEventListener("click", () => {
            alert("Message Sent Successfully!");
        });
    </script>

</body>
</html>
